server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # K8s CoreDNS IP — stable in K3s. Tells nginx to re-resolve on each request.
    resolver 10.43.0.10 valid=10s ipv6=off;

    location /api/ {
        # Use a variable so nginx re-resolves via the resolver above
        set $backend_host backend.mini-portal.svc.cluster.local;
        proxy_pass         http://$backend_host:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}